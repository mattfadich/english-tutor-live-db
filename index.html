<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>English Tutor Live DB</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, sans-serif;
      line-height: 1.45;
    }
    body {
      margin: 0;
      padding: 32px;
      max-width: 960px;
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    dl {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 8px 16px;
    }
    dt {
      font-weight: 700;
    }
    pre {
      overflow: auto;
      padding: 16px;
      border: 1px solid #ccd3dd;
      border-radius: 6px;
      background: rgba(127, 127, 127, 0.08);
    }
  </style>
</head>
<body>
  <h1>English Tutor Live DB</h1>
  <dl>
    <dt>Status</dt>
    <dd id="status">Loading...</dd>
    <dt>Last updated</dt>
    <dd id="last-updated"></dd>
    <dt>Source</dt>
    <dd id="source"></dd>
  </dl>
  <h2>Review Targets</h2>
  <pre id="review-targets">[]</pre>
  <script>
    async function loadDatabase() {
      const response = await fetch("./tutor-database.json", { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      const data = await response.json();
      document.getElementById("status").textContent = data.ok ? "OK" : "Not OK";
      document.getElementById("last-updated").textContent = data.last_updated || "";
      document.getElementById("source").textContent = data.source || "";
      document.getElementById("review-targets").textContent = JSON.stringify(data.review_targets || [], null, 2);
    }

    loadDatabase().catch((error) => {
      document.getElementById("status").textContent = `Error: ${error.message}`;
    });
  </script>
</body>
</html>
